name: Performance Budget

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  performance-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle size budget
        run: npm run perf:bundle

      - name: Lighthouse budget
        run: npm run perf:lighthouse:ci
